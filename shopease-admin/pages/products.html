<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEase Admin — Products</title>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><svg viewBox="0 0 40 40" fill="none" width="32"><rect width="40" height="40" rx="10" fill="#FF6B35"/><path d="M10 14h20M10 20h14M10 26h18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><circle cx="28" cy="26" r="4" fill="#fff"/></svg><span>ShopEase</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>Dashboard</a>
      <a href="orders.html" class="nav-item"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3z"/></svg>Orders<span class="nav-badge">12</span></a>
      <a href="products.html" class="nav-item active"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 2a4 4 0 00-4 4v1H5a1 1 0 00-.994.89l-1 9A1 1 0 004 18h12a1 1 0 00.994-1.11l-1-9A1 1 0 0015 7h-1V6a4 4 0 00-4-4zm2 5V6a2 2 0 10-4 0v1h4z" clip-rule="evenodd"/></svg>Products</a>
      <a href="users.html" class="nav-item"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>Users</a>
      <a href="notifications.html" class="nav-item"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg>Push Notifications</a>
      <a href="analytics.html" class="nav-item"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11 4a1 1 0 10-2 0v4a1 1 0 102 0V7zm-3 1a1 1 0 10-2 0v3a1 1 0 102 0V8zM8 9a1 1 0 00-2 0v2a1 1 0 102 0V9z" clip-rule="evenodd"/></svg>Analytics</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-avatar"><div class="avatar-ring">A</div><div><p class="admin-name" id="adminName">Admin</p><p class="admin-role">Super Admin</p></div></div>
      <button class="btn-logout" onclick="logout()"><svg viewBox="0 0 20 20" fill="currentColor" width="18"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg></button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 20 20" fill="currentColor" width="20"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg></button>
        <div><h1 class="page-title">Products</h1><p class="page-sub">Manage your product catalogue</p></div>
      </div>
      <div class="topbar-right">
        <input type="text" class="search-input" id="productSearch" placeholder="Search products…" oninput="filterProducts()"/>
        <button class="btn-send" style="flex:none;padding:10px 20px;font-size:14px;gap:8px" onclick="openAddProduct()">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
          Add Product
        </button>
      </div>
    </header>

    <div class="content">
      <div id="toastArea" class="toast-area"></div>
      <div class="products-grid" id="productsGrid"></div>
    </div>
  </main>

  <!-- Add/Edit Product Modal -->
  <div class="modal-overlay" id="productModal" onclick="closeModal(event)">
    <div class="modal-box" style="max-width:520px">
      <div class="modal-header">
        <h3 id="productModalTitle">Add Product</h3>
        <button class="modal-close" onclick="document.getElementById('productModal').style.display='none'">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Product Name</label><input type="text" id="pName" class="form-input" placeholder="e.g. Wireless Earbuds Pro"/></div>
        <div class="form-group"><label class="form-label">Category</label>
          <select id="pCategory" class="form-input form-select">
            <option>Electronics</option><option>Clothing</option><option>Food</option><option>Books</option><option>Sports</option><option>Beauty</option>
          </select>
        </div>
        <div style="display:flex;gap:12px">
          <div class="form-group" style="flex:1"><label class="form-label">Price (LKR)</label><input type="number" id="pPrice" class="form-input" placeholder="1999.00"/></div>
          <div class="form-group" style="flex:1"><label class="form-label">Stock</label><input type="number" id="pStock" class="form-input" placeholder="50"/></div>
        </div>
        <div class="form-group"><label class="form-label">Description</label><textarea id="pDesc" class="form-input form-textarea" rows="3" placeholder="Product description…"></textarea></div>
        <div class="form-group"><label class="form-label">Image URL</label><input type="url" id="pImage" class="form-input" placeholder="https://…"/></div>
      </div>
      <div class="modal-footer">
        <button class="btn-send" style="flex:none;padding:12px 32px" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>

  <script src="../js/auth-guard.js"></script>
  <script src="../js/products.js"></script>
</body>
</html>
