<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEase Admin — Login</title>
  <link rel="stylesheet" href="css/login.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="12" fill="#FF6B35"/>
            <path d="M10 14h20M10 20h14M10 26h18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="28" cy="26" r="4" fill="#fff"/>
          </svg>
        </div>
        <div>
          <h1 class="brand-name">ShopEase</h1>
          <span class="brand-tag">Admin Console</span>
        </div>
      </div>

      <h2 class="login-title">Welcome back</h2>
      <p class="login-sub">Sign in to manage your store</p>

      <div id="errorMsg" class="error-msg" style="display:none">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        Invalid username or password
      </div>

      <form id="loginForm" class="login-form">
        <div class="field">
          <label>Username</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
            <input type="text" id="username" placeholder="admin" autocomplete="username"/>
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="toggle-pass" onclick="togglePassword()">
              <svg id="eyeIcon" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
            </button>
          </div>
        </div>
        <div class="hint-box">
          <span>Demo credentials:</span>
          <code>admin</code> / <code>shopease@2025</code>
        </div>
        <button type="submit" class="btn-login">
          <span>Sign In</span>
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
        </button>
      </form>
    </div>

    <div class="login-visual">
      <div class="stat-float stat-1">
        <span class="stat-label">Today's Revenue</span>
        <span class="stat-val">LKR 84,320</span>
        <span class="stat-up">↑ 12.4%</span>
      </div>
      <div class="stat-float stat-2">
        <span class="stat-label">New Orders</span>
        <span class="stat-val">47</span>
        <span class="stat-up">↑ 8 today</span>
      </div>
      <div class="stat-float stat-3">
        <span class="stat-label">Active Users</span>
        <span class="stat-val">1,284</span>
      </div>
      <div class="visual-center">
        <div class="vc-ring vc-ring-1"></div>
        <div class="vc-ring vc-ring-2"></div>
        <div class="vc-ring vc-ring-3"></div>
        <div class="vc-core">
          <svg viewBox="0 0 60 60" fill="none" width="60">
            <path d="M15 20h30M15 30h20M15 40h25" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
            <circle cx="44" cy="40" r="6" fill="#FF6B35" opacity=".3"/>
            <circle cx="44" cy="40" r="3" fill="#FF6B35"/>
          </svg>
        </div>
      </div>
      <p class="visual-label">ShopEase Admin Dashboard</p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
